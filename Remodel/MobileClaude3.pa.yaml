Screens:
  DashboardScreen_M3:
    Properties:
      Fill: =RGBA(249, 250, 251, 1)
      LoadingSpinnerColor: =BrandRed
      OnVisible: |-
        =If(IsBlank(varSelectedLeadM3), Set(varSelectedLeadM3, First(Leads)));
        Set(varSourceFilterM3, "All Sources");
        Set(varProducerFilterM3, "All Producers");
        Set(varStatusFilterM3, "Follow-up");
        Set(varSearchM3, "");
        ClearCollect(colStatusCardsM3,
            {Key:"New",         Label:"New",         Count: CountRows(Filter(Leads, Status.Value = "New")),         Tint: RGBA(37, 99, 235, 1),  TintSoft: RGBA(232, 240, 254, 1)},
            {Key:"In Progress", Label:"In Progress", Count: CountRows(Filter(Leads, Status.Value = "In Progress")), Tint: RGBA(217, 119, 6, 1),  TintSoft: RGBA(254, 243, 199, 1)},
            {Key:"Quoted",      Label:"Quoted",      Count: CountRows(Filter(Leads, Status.Value = "Quoted")),      Tint: RGBA(22, 163, 74, 1),  TintSoft: RGBA(220, 252, 231, 1)},
            {Key:"Bound",       Label:"Bound",       Count: CountRows(Filter(Leads, Status.Value = "Bound")),       Tint: RGBA(13, 148, 136, 1), TintSoft: RGBA(204, 251, 241, 1)},
            {Key:"Lost",        Label:"Lost",        Count: CountRows(Filter(Leads, Status.Value = "Lost")),        Tint: RGBA(107, 114, 128, 1),TintSoft: RGBA(243, 244, 246, 1)},
            {Key:"Follow-up",   Label:"Follow-up",   Count: CountRows(Filter(Leads, Status.Value = "Follow-up")),   Tint: BrandRed,              TintSoft: RGBA(254, 226, 226, 1)}
        );
        ClearCollect(colStagesM3,
            {Key:"New",         Order: 1, Label:"New"},
            {Key:"In Progress", Order: 2, Label:"In Progress"},
            {Key:"Quoted",      Order: 3, Label:"Quoted"},
            {Key:"Bound",       Order: 4, Label:"Bound"},
            {Key:"Lost",        Order: 5, Label:"Lost"}
        );
        ClearCollect(colActionRailM3,
            {Key:"call",     Label:"Call",        Icon: Icon.Phone},
            {Key:"email",    Label:"Email",       Icon: Icon.Mail},
            {Key:"text",     Label:"Text",        Icon: Icon.Message},
            {Key:"note",     Label:"Add Note",    Icon: Icon.Edit},
            {Key:"task",     Label:"Create Task", Icon: Icon.AddDocument},
            {Key:"upload",   Label:"Upload File", Icon: Icon.Folder},
            {Key:"quote",    Label:"Create Quote",Icon: Icon.DocumentPDF}
        );
        ClearCollect(colNavM3,
            {Key:"home",       Label:"Home",       Icon: Icon.Home,           Active: false, OnSelectKey: "home"},
            {Key:"leads",      Label:"Leads",      Icon: Icon.People,         Active: true,  OnSelectKey: "leads"},
            {Key:"accounts",   Label:"Accounts",   Icon: Icon.PersonAccount,  Active: false, OnSelectKey: "accounts"},
            {Key:"policies",   Label:"Policies",   Icon: Icon.Shop,           Active: false, OnSelectKey: "policies"},
            {Key:"activities", Label:"Activities", Icon: Icon.CheckBadge,     Active: false, OnSelectKey: "activities"},
            {Key:"documents",  Label:"Documents",  Icon: Icon.Folder,         Active: false, OnSelectKey: "documents"},
            {Key:"reports",    Label:"Reports",    Icon: Icon.Trending,       Active: false, OnSelectKey: "reports"},
            {Key:"dashboards", Label:"Dashboards", Icon: Icon.Items,          Active: false, OnSelectKey: "dashboards"}
        )
    Children:
      - HeaderBar_M3:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =BrandRed
            Height: =64
            Width: =Parent.Width
            X: =0
            Y: =0
      - HeaderAppsIcon_M3:
