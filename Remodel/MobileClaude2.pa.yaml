Screens:
  DashboardScreen_M2:
    Properties:
      Fill: =RGBA(249, 250, 251, 1)
      LoadingSpinnerColor: =BrandRed
      OnVisible: |-
        =Set(varSidebarBg, RGBA(17, 24, 39, 1));
        Set(varSidebarText, RGBA(229, 231, 235, 1));
        Set(varSidebarMuted, RGBA(156, 163, 175, 1));
        If(IsBlank(varSelectedLeadM2), Set(varSelectedLeadM2, First(Leads)));
        If(IsBlank(varAgentFilterM2), Set(varAgentFilterM2, "All Agents"));
        If(IsBlank(varDateRangeM2), Set(varDateRangeM2, "May 5 — May 11, 2026"));
        ClearCollect(colKpiM2,
            {Key:"new",     Label:"New Leads",          Value: CountRows(Filter(Leads, Status.Value = "New")),                 Delta:"+12% vs last 7 days",  DeltaUp: true,  Icon: Icon.People,         Tint: RGBA(37, 99, 235, 1),  TintSoft: RGBA(232, 240, 254, 1)},
            {Key:"pend",    Label:"Pending Review",     Value: CountRows(Filter(Leads, Status.Value = "In Progress")),         Delta:"-8% vs last 7 days",   DeltaUp: false, Icon: Icon.Clock,          Tint: RGBA(217, 119, 6, 1),  TintSoft: RGBA(254, 243, 199, 1)},
            {Key:"quoted",  Label:"Quotes Sent",        Value: CountRows(Filter(Leads, Status.Value = "Quoted")),              Delta:"+5% vs last 7 days",   DeltaUp: true,  Icon: Icon.DocumentPDF,    Tint: RGBA(22, 163, 74, 1),  TintSoft: RGBA(220, 252, 231, 1)},
            {Key:"followup",Label:"Follow Ups Due",     Value: CountRows(Filter(Leads, Status.Value = "Follow-up")),           Delta:"Due today",            DeltaUp: true,  Icon: Icon.CalendarBlank,  Tint: RGBA(124, 58, 237, 1), TintSoft: RGBA(237, 233, 254, 1)},
            {Key:"bound",   Label:"Bound (This Month)", Value: CountRows(Filter(Leads, Status.Value = "Bound")),               Delta:"+29% vs last month",   DeltaUp: true,  Icon: Icon.CheckBadge,     Tint: RGBA(13, 148, 136, 1), TintSoft: RGBA(204, 251, 241, 1)}
        );
        ClearCollect(colStatusBreakdownM2,
            {Label:"New",          Count: CountRows(Filter(Leads, Status.Value = "New")),           Tint: RGBA(37, 99, 235, 1)},
            {Label:"In Progress",  Count: CountRows(Filter(Leads, Status.Value = "In Progress")),   Tint: RGBA(217, 119, 6, 1)},
            {Label:"Quoted",       Count: CountRows(Filter(Leads, Status.Value = "Quoted")),        Tint: RGBA(239, 68, 68, 1)},
            {Label:"Follow-up",    Count: CountRows(Filter(Leads, Status.Value = "Follow-up")),     Tint: RGBA(124, 58, 237, 1)},
            {Label:"Bound",        Count: CountRows(Filter(Leads, Status.Value = "Bound")),         Tint: RGBA(22, 163, 74, 1)},
            {Label:"Lost",         Count: CountRows(Filter(Leads, Status.Value = "Lost")),          Tint: RGBA(107, 114, 128, 1)}
        );
        ClearCollect(colSourceBreakdownM2,
            {Label:"Walk-in",   Count: CountRows(Filter(Leads, Source.Value = "Walk-in")),    Tint: RGBA(124, 58, 237, 1)},
            {Label:"Call-in",   Count: CountRows(Filter(Leads, Source.Value = "Call-in")),    Tint: RGBA(217, 119, 6, 1)},
            {Label:"Referral",  Count: CountRows(Filter(Leads, Source.Value = "Referral")),   Tint: RGBA(22, 163, 74, 1)},
            {Label:"Cross-sell",Count: CountRows(Filter(Leads, Source.Value = "Cross-sell")), Tint: RGBA(37, 99, 235, 1)},
            {Label:"Re-quote",  Count: CountRows(Filter(Leads, Source.Value = "Re-quote")),   Tint: RGBA(107, 114, 128, 1)}
        );
        ClearCollect(colTeamInboxM2,
            {Address:"teamac@alfains.com", Unread: 12},
            {Address:"SC1047@alfains.com", Unread: 5}
        )
