      - ActListGallery:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_ThreeTextVariant_ver5.0
          Properties:
            BorderColor: =BorderSoft
            DelayItemLoading: =false
            Fill: =RGBA(255, 255, 255, 1)
            Height: =Parent.Height - 200
            Items: =SortByColumns(Filter(Activities, IsBlank(varActivitySearch) || StartsWith(ActivityNotes, varActivitySearch)), "EventDate", SortOrder.Descending)
            LoadingSpinner: =LoadingSpinner.None
            TemplateSize: =72
            Width: =1924
            X: =367
            Y: =152
          Children:
            - ActRowIcon:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =TextPrimary
                  DisabledColor: =RGBA(186, 186, 186, 1)
                  Font: =Font.'Open Sans'
                  Height: =32
                  PaddingRight: =5.45
                  PaddingTop: =5.45
                  Size: =19.60
                  Text: |-
                    =Switch(ThisItem.ActivityType.Value, "Phone Call", "📞", "Text", "💬", "Email", "📨", "Meeting", "🤝", "Note", "📝", "Status Change", "🔄", "Created", "✨", "📌")
                  Width: =34.84
                  X: =8.71
                  Y: =8
            - ActRowTitle:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =TextPrimary
                  DisabledColor: =RGBA(186, 186, 186, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =18
                  PaddingRight: =5.45
                  PaddingTop: =5.45
                  Size: =13.06
                  Text: =If(IsBlank(ThisItem.Lead), Coalesce(ThisItem.ActivityType.Value, ThisItem.Title), ThisItem.Lead.Value & " — " & Coalesce(ThisItem.ActivityType.Value, ""))
                  Width: =1236.93
                  X: =52.27
                  Y: =8
            - ActRowNotes:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =TextSecondary
                  DisabledColor: =RGBA(186, 186, 186, 1)
                  Font: =Font.'Open Sans'
                  Height: =14
                  PaddingRight: =5.45
                  PaddingTop: =5.45
                  Size: =10.88
                  Text: =Coalesce(ThisItem.ActivityNotes, "")
                  Width: =1236.93
                  X: =52.27
                  Y: =28
            - ActRowDate:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Right
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =TextSecondary
                  DisabledColor: =RGBA(186, 186, 186, 1)
                  Font: =Font.'Open Sans'
                  Height: =18
                  PaddingRight: =5.45
                  PaddingTop: =5.45
                  Size: =10.88
                  Text: =Text(ThisItem.EventDate, "[$-en-US]m/d/yy h:mm AM/PM")
                  Width: =174.22
                  X: =1258.71
                  Y: =8
            - ActRowSeparator:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 255, 1)
                  Fill: =BorderSoft
                  Height: =1
                  Width: =1454.70
                  X: =0.00
                  Y: =71
