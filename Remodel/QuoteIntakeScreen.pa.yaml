            # ----- Save Intake big button -----
            - ReviewSaveBtn:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =Win95Shadow
                  BorderThickness: =2
                  Color: =Win95Text
                  DisplayMode: =If(varQuoteMode = "Edit" && !IsBlank(varEditingQuote), DisplayMode.Edit, DisplayMode.Disabled)
                  Fill: =Win95Face
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =44
                  HoverFill: =Win95Light
                  OnSelect: |-
                    =Set(varEditingQuote,
                        Patch('Home Quotes', varEditingQuote, {
                            Title:    locName,
                            DOB:      locDOB,
                            Phone:    locPhone,
                            Email:    locEmail,
                            ReferralName: locReferral,
                            Agent:    locProducer,
                            SpouseName:   locSpouse,
                            MailingAddress: locMailing,
                            RiskAddress:    locRisk,
                            YearBuilt: locYearBuilt,
                            LivingSqFootage: locSqFt,
                            Occupancy: locOccupancy,
                            NewPurchase: locNewPurchase,
                            RoofType: locRoofType,
                            AgeOfRoof: locRoofAge,
                            CurrentCarrier: locCurrentCarrier,
                            CurrentPremium: locCurrentPremium,
                            DwellingCoverage: locDwelling,
                            Deductible: locDeductible,
                            Notes: locNotes,
                            FiledClaimsLast5Yrs: locClaimsCount,
                            UW_InsuranceScorePermission: locInsScoreOK
                        })
                    );
                    Notify("Intake saved.", NotificationType.Success, 2000);
                    Set(varQuoteMode, Blank());
                    Set(varEditingQuote, Blank());
                    Set(varQuoteSection, Blank());
                    Navigate(Dashboard, ScreenTransition.None)
                  PressedFill: =Win95Shadow
                  Size: =12
                  Text: ="💾  Save Intake"
                  Width: =220
                  X: =660
                  Y: =300

