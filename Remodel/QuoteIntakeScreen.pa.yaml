            Font: =Font.'Open Sans'
            Height: =60
            HoverFill: =Win95Light
            OnSelect: |-
              =Set(varQuoteMode, "New");
              Set(varEditingQuote, Blank());
              Set(varQuoteSection, "Applicant");
              UpdateContext({
                  locName: "", locDOB: Blank(), locPhone: "", locEmail: "",
                  locReferral: Blank(), locProducer: Blank(),
                  locSpouse: "", locMailing: "", locRisk: "",
                  locPrefContact: Blank(), locBestTime: Blank(),
                  locYearBuilt: Blank(), locSqFt: Blank(), locOccupancy: Blank(),
                  locNewPurchase: false, locRoofType: Blank(), locRoofAge: Blank(),
                  locCurrentCarrier: "", locCurrentPremium: Blank(),
                  locDwelling: Blank(), locDeductible: Blank(), locNotes: "",
                  locClaimsCount: 0, locInsScoreOK: false, locLastSavedAt: Blank()
              })
            PressedFill: =Win95Shadow
            Size: =10
            Text: ="📄" & Char(10) & "New"
            Width: =68
            X: =18
            Y: =82
      - TbSave:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =Win95Shadow
            BorderThickness: =1
            Color: =Win95Text
            DisplayMode: =If(varQuoteMode = "Edit" && !IsBlank(varEditingQuote), DisplayMode.Edit, DisplayMode.Disabled)
            Fill: =Win95Face
            Font: =Font.'Open Sans'
            Height: =60
            HoverFill: =Win95Light
            OnSelect: |-
              =UpdateContext({ locSaving: true });
              Set(varEditingQuote,
                  Patch('Home Quotes', varEditingQuote, {
                      Title:    locName,
                      DOB:      locDOB,
                      Phone:    locPhone,
                      Email:    locEmail,
                      ReferralName: locReferral,
                      Agent:    locProducer,
                      SpouseName:   locSpouse,
                      MailingAddress: locMailing,
                      RiskAddress:    locRisk,
                      YearBuilt: locYearBuilt,
                      LivingSqFootage: locSqFt,
                      Occupancy: locOccupancy,
                      NewPurchase: locNewPurchase,
                      RoofType:  locRoofType,
                      AgeOfRoof: locRoofAge,
                      CurrentCarrier: locCurrentCarrier,
                      CurrentPremium: locCurrentPremium,
                      DwellingCoverage: locDwelling,
                      Deductible: locDeductible,
                      Notes:     locNotes,
                      FiledClaimsLast5Yrs: locClaimsCount,
                      UW_InsuranceScorePermission: locInsScoreOK
                  })
              );
              UpdateContext({ locSaving: false, locLastSavedAt: Now() });
              Notify("Quote saved.", NotificationType.Success, 2000)
            PressedFill: =Win95Shadow
            Size: =10
            Text: ="💾" & Char(10) & "Save"
            Width: =68
            X: =90
            Y: =82
