Screens:
  QuoteIntakeScreen:
    Properties:
      Fill: =Win95Face
      LoadingSpinnerColor: =Win95TitleNavy
      OnVisible: |-
        =Set(Win95Face,       RGBA(192, 192, 192, 1));
        Set(Win95Light,       RGBA(255, 255, 255, 1));
        Set(Win95Shadow,      RGBA(128, 128, 128, 1));
        Set(Win95Dark,        RGBA(64, 64, 64, 1));
        Set(Win95TitleNavy,   RGBA(0, 0, 128, 1));
        Set(Win95TitleBlue,   RGBA(16, 132, 208, 1));
        Set(Win95Text,        RGBA(0, 0, 0, 1));
        Set(Win95InputBg,     RGBA(255, 255, 255, 1));
        Set(Win95Group,       RGBA(0, 0, 128, 1));
        Set(Win95Disabled,    RGBA(132, 132, 132, 1));
        If(IsBlank(varQuoteMode), Set(varQuoteMode, "New"));
        If(IsBlank(varQuoteSection), Set(varQuoteSection, "Applicant"));
        If(varQuoteMode = "Edit" && !IsBlank(varEditingQuote),
            UpdateContext({
                locName:     varEditingQuote.Title,
                locDOB:      varEditingQuote.DOB,
                locPhone:    varEditingQuote.Phone,
                locEmail:    varEditingQuote.Email,
                locReferral: varEditingQuote.ReferralName,
                locProducer: varEditingQuote.Agent,
                locSpouse:   varEditingQuote.SpouseName,
                locMailing:  varEditingQuote.MailingAddress,
                locRisk:     varEditingQuote.RiskAddress,
                locYearBuilt:    varEditingQuote.YearBuilt,
                locSqFt:         varEditingQuote.LivingSqFootage,
                locOccupancy:    varEditingQuote.Occupancy,
                locNewPurchase:  varEditingQuote.NewPurchase,
                locRoofType:     varEditingQuote.RoofType,
                locRoofAge:      varEditingQuote.AgeOfRoof,
                locCurrentCarrier: varEditingQuote.CurrentCarrier,
                locCurrentPremium: varEditingQuote.CurrentPremium,
                locDwelling:     varEditingQuote.DwellingCoverage,
                locDeductible:   varEditingQuote.Deductible,
                locNotes:        varEditingQuote.Notes,
                locClaimsCount:  varEditingQuote.FiledClaimsLast5Yrs,
                locInsScoreOK:   varEditingQuote.UW_InsuranceScorePermission,
                locLastSavedAt:  varEditingQuote.Modified
            }),
            UpdateContext({
                locName: "", locDOB: Blank(), locPhone: "", locEmail: "",
                locReferral: Blank(), locProducer: Blank(),
                locSpouse: "", locMailing: "", locRisk: "",
                locPrefContact: Blank(), locBestTime: Blank(),
                locYearBuilt: Blank(), locSqFt: Blank(), locOccupancy: Blank(),
                locNewPurchase: false, locRoofType: Blank(), locRoofAge: Blank(),
                locCurrentCarrier: "", locCurrentPremium: Blank(),
                locDwelling: Blank(), locDeductible: Blank(), locNotes: "",
                locClaimsCount: 0, locInsScoreOK: false, locLastSavedAt: Blank()
            })
        )
    Children:
      # ---------- Outer window frame (raised bevel) ----------
      - WinFrameOuter:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =Win95Dark
            Height: =1200
            Width: =2400
            X: =0
            Y: =0
      - WinFrameInner:
          Control: Rectangle@2.3.0
