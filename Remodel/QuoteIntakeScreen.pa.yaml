      # ================================================================
      # ===================  APPLICANT SECTION  ========================
      # ================================================================
      - ApplicantPanel:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =Win95Face
            Height: =940
            Visible: =varQuoteSection = "Applicant"
            Width: =2118
            X: =262
            Y: =152
          Children:
            - AppGroupTitleBg:
                Control: Label@2.5.1
                Properties:
                  Color: =Win95Group
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =30
                  PaddingLeft: =12
                  PaddingTop: =6
                  Size: =13
                  Text: ="Applicant Information"
                  Width: =400
                  X: =20
                  Y: =14
            - AppNameLbl:
                Control: Label@2.5.1
                Properties:
                  Color: =Win95Text
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =22
                  Size: =11
                  Text: "=\"Named Insured:\""
                  Width: =240
                  X: =40
                  Y: =60
            - AppNameInput:
                Control: Classic/TextInput@2.3.2
                Properties:
                  BorderColor: =Win95Shadow
                  BorderThickness: =1
                  Color: =Win95Text
                  Default: =locName
                  Fill: =Win95InputBg
                  Font: =Font.'Open Sans'
                  Height: =30
                  HintText: ="John Smith"
