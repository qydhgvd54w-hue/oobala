      - cmpTotalLeadsDashboard_1:
          Control: CanvasComponent
          ComponentName: cmpTotalLeadsDashboard
          Properties:
            AnimationEffect: ="Pop"
            ColumnsLayout: "={\n      Mobile: 1,\n      Tablet: 2,\n      Desktop: 4,\n      MobileBreakpoint:  IfError(Index(App.SizeBreakpoints, 1).Value, 640),\n      TabletBreakpoint:  IfError(Index(App.SizeBreakpoints, 2).Value, 1024),\n      DesktopBreakpoint: IfError(Index(App.SizeBreakpoints, 3).Value, 1366)\n  }\n\n  "
            Data: |-
              =Table(
                  {ID: 1, Icon: "Users", Value: 1284, Label: "Total Leads", PercentChange: 18, PercentLabel: "vs last month", IconBg: "#EBF5FF", IconColor: "#2196F3", SparklineData: "620,710,780,830,900,980,1100,1180,1240,1284", isHidden: false},
                  {ID: 2, Icon: "Target", Value: 437, Label: "Qualified Leads", PercentChange: 11, PercentLabel: "vs last month", IconBg: "#F0FDF4", IconColor: "#22C55E", SparklineData: "210,245,270,295,320,355,380,400,420,437", isHidden: false},
                  {ID: 3, Icon: "Shield", Value: 198, Label: "Policies Closed", PercentChange: 23, PercentLabel: "vs last month", IconBg: "#FDF4FF", IconColor: "#A855F7", SparklineData: "80,95,108,120,135,150,162,175,188,198", isHidden: false},
                  {ID: 4, Icon: "Clock", Value: 4, Label: "Avg. Response", PercentChange: -12, PercentLabel: "vs last month", IconBg: "#FFF7ED", IconColor: "#F97316", SparklineData: "9,8,8,7,7,6,6,5,5,4", isHidden: false}
              )
