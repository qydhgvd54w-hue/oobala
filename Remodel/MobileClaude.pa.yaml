      - LeadQueueGallery_M:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =Parent.Height - 232
            Items: |-
              =SortByColumns(
                  Filter(
                      Leads,
                      (varStatusFilterM = "All" || StartsWith(Status.Value, varStatusFilterM)),
                      (IsBlank(varDashSearchM)
                          || StartsWith(Lower(Title), Lower(varDashSearchM))
                          || StartsWith(Lower(Coalesce(Phone, "")), Lower(varDashSearchM))
                          || StartsWith(Lower(Coalesce(Email, "")), Lower(varDashSearchM)))
                  ),
                  "Modified", SortOrder.Descending
              )
            ShowScrollbar: =true
            TemplatePadding: =0
            TemplateSize: =92
            Width: =400
            X: =261
            Y: =220
          Children:
            - LeadCardBg_M:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =If(ThisItem.ID = varSelectedLeadM.ID, BrandRed, BorderSoft)
                  BorderThickness: =If(ThisItem.ID = varSelectedLeadM.ID, 2, 1)
                  Fill: =If(ThisItem.ID = varSelectedLeadM.ID, BrandSoft, RGBA(255, 255, 255, 1))
                  Height: =84
                  OnSelect: =Set(varSelectedLeadM, ThisItem)
                  Width: =400
                  X: =0
                  Y: =4
            - LeadCardName_M:
                Control: Label@2.5.1
                Properties:
                  Color: =TextPrimary
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =22
                  OnSelect: =Set(varSelectedLeadM, ThisItem)
                  PaddingLeft: =14
                  PaddingTop: =4
                  Size: =13
                  Text: =Coalesce(ThisItem.Title, "Unnamed Lead")
                  Width: =260
                  X: =0
                  Y: =12
            - LeadCardStatusPill_M:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: |
                    =Switch(ThisItem.Status.Value,
                        "Working",  RGBA(255, 244, 230, 1),
                        "Quoted",   RGBA(232, 240, 254, 1),
                        "Bound",    RGBA(225, 245, 232, 1),
                        "Lost",     RGBA(245, 230, 230, 1),
                        RGBA(241, 243, 247, 1)
                    )
                  Height: =22
                  Width: =72
                  X: =314
                  Y: =14
            - LeadCardStatusLabel_M:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |
                    =Switch(ThisItem.Status.Value,
                        "Working",  RGBA(180, 95, 0, 1),
                        "Quoted",   RGBA(36, 84, 168, 1),
                        "Bound",    RGBA(30, 110, 60, 1),
                        "Lost",     RGBA(155, 40, 40, 1),
                        TextSecondary
                    )
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =22
                  PaddingTop: =4
                  Size: =9
                  Text: =Upper(Coalesce(ThisItem.Status.Value, "—"))
                  Width: =72
