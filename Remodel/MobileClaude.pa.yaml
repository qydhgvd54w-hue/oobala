Screens:
  DashboardScreen_M:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =BrandRed
      OnVisible: |-
        =ClearCollect(colLeadCountsM,
            {Status:"Working",  Count: CountRows(Filter(Leads, Status.Value = "Working"))},
            {Status:"Quoted",   Count: CountRows(Filter(Leads, Status.Value = "Quoted"))},
            {Status:"Bound",    Count: CountRows(Filter(Leads, Status.Value = "Bound"))},
            {Status:"Lost",     Count: CountRows(Filter(Leads, StartsWith(Status.Value, "Lost")))},
            {Status:"Total",    Count: CountRows(Leads)}
        );
        If(IsBlank(varStatusFilterM), Set(varStatusFilterM, "All"));
        If(IsBlank(varSelectedLeadM), Set(varSelectedLeadM, First(Leads)));
        Set(varDashSearchM, "");
        ClearCollect(colProductsInPlayM,
            {Name:"Auto",     Active: true},
            {Name:"Home",     Active: true},
            {Name:"Umbrella", Active: false},
            {Name:"Life",     Active: false}
        );
        ClearCollect(colEmailTemplatesM,
            {Title:"Welcome / Intro",      Description:"First touch after lead capture",          Tag:"Intro"},
            {Title:"Quote Ready",          Description:"Send finalized quote details",            Tag:"Quote"},
            {Title:"Follow-up 3 day",      Description:"Nudge after quote with no reply",         Tag:"Follow"},
            {Title:"Bound - Welcome Aboard", Description:"Confirm policy is in force",            Tag:"Bound"},
            {Title:"Lost - Stay In Touch", Description:"Polite hold for future renewal",          Tag:"Lost"}
        )
    Children:
      - SidebarBg_M:
          Control: Rectangle@2.3.0
