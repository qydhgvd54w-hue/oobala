            HoverFill: =RGBA(254, 249, 195, 1)
            OnSelect: |-
              =Planner.CreateTaskV3(
                  "d3d6d36a-2fdd-4cea-ac61-bdd8e0a132d3",
                  "TIYlGCM_vkSWPKmEYDdSVGQAD_j5",
                  "Follow-up: " & Coalesce(varSelectedQuote.Title, "client"),
                  { startDateTime: Now(), dueDateTime: DateAdd(Today(), 1, TimeUnit.Days) }
              );
              IfError(
                  Office365Outlook.V4CalendarPostItem(
                      varDefaultCalendar.id,
                      "Follow-up: " & Coalesce(varSelectedQuote.Title, "client"),
                      Text(DateAdd(Today(), 1, TimeUnit.Days), "yyyy-MM-ddTHH:mm:ss"),
                      Text(DateAdd(DateAdd(Today(), 1, TimeUnit.Days), 30, TimeUnit.Minutes), "yyyy-MM-ddTHH:mm:ss"),
                      "Pacific Standard Time",
                      { body: "Auto-created from CRM follow-up", showAs: "Busy" }
                  ),
                  Notify("Calendar error: " & FirstError.Message, NotificationType.Error)
              );
              Notify("Follow-up scheduled", NotificationType.Success)
