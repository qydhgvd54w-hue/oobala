            - ActIconBg:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: |
                    =Switch(ThisItem.ActivityType.Value,
                        "Call",      BrandSoft,
                        "Text",      RGBA(239, 246, 255, 1),
                        "Email",     RGBA(245, 243, 255, 1),
                        "Voicemail", RGBA(255, 247, 237, 1),
                        BgCream
