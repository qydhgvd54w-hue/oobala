Screens:
  Dashboard:
    Properties:
      Fill: =BgCream2
      LoadingSpinnerColor: =BrandRed
      OnVisible: |-
        =Set(BrandRed,      RGBA(200, 16, 46, 1));
        Set(BrandRedDark,  RGBA(159, 12, 36, 1));
        Set(BrandSoft,     RGBA(252, 235, 235, 1));
        Set(BgCream,       RGBA(250, 249, 245, 1));
        Set(BgCream2,      RGBA(244, 242, 238, 1));
        Set(TextPrimary,   RGBA(31, 30, 29, 1));
        Set(TextSecondary, RGBA(107, 106, 103, 1));
        Set(TextTertiary,  RGBA(168, 165, 160, 1));
        Set(BorderSoft,    RGBA(232, 229, 221, 1));
        ClearCollect(colHomeQuotes, 'Home Quotes');
        ClearCollect(colActivities, SortByColumns(Activities, "Created", SortOrder.Descending));
        ClearCollect(colTemplates, 'Email Templates');
        ClearCollect(colQuoteDocs, 'Quote Documents');
        ClearCollect(colNotes, SortByColumns(Filter(Activities, ActivityType.Value = "Note"), "EventDate", SortOrder.Descending));
        Set(varDefaultCalendar, {id: "Calendar"});
        If(IsBlank(varSelectedQuote), Set(varSelectedQuote, First('Home Quotes')));
        Set(varSelectedLead, Blank());
        Set(varSearchText, "");
        Set(varPage, 1);
        Set(varPageSize, 11);
        Set(varQuickAddOpen, false);
        Set(varNoteDraft, "")
