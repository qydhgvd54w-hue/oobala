            DisabledFill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =64
            HintText: ="Add a note about " & Coalesce(varSelectedQuote.Title, "this lead") & "..."
            HoverFill: =RGBA(255, 255, 255, 1)
