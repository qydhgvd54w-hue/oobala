            Width: =469
            X: =258
            Y: =874
      - NotesSaveBtn:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =TextPrimary
            BorderThickness: =1
            Color: =RGBA(255, 255, 255, 1)
            Fill: =TextPrimary
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =30
            HoverFill: =BrandRed
            OnSelect: |-
              =If(
                  !IsBlank(varNoteDraft) && !IsBlank(varSelectedLead),
                  Patch(
                      Activities,
                      Defaults(Activities),
                      {
                          Title:         "Note: " & Coalesce(varSelectedQuote.Title, varSelectedLead.Title, "lead"),
                          ActivityType:  { Value: "Note" },
                          EventDate:     Now(),
                          ActivityNotes: varNoteDraft,
                          Lead:          { Id: varSelectedLead.ID, Value: varSelectedLead.Title }
                      }
                  );
                  Refresh(Activities);
                  ClearCollect(colActivities, SortByColumns(Activities, "Created", SortOrder.Descending));
                  ClearCollect(colNotes, SortByColumns(Filter(Activities, ActivityType.Value = "Note"), "EventDate", SortOrder.Descending));
                  Reset(NotesInput);
                  Set(varNoteDraft, "");
                  Notify("Note saved", NotificationType.Success),
                  Notify("Type a note and select a lead first", NotificationType.Warning)
              )
            Size: =11
            Text: ="Save Note"
            Width: =100
            X: =627
            Y: =944
