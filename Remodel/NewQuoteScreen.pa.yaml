Screens:
  NewQuoteScreen:
    Properties:
      Fill: =RGBA(245, 246, 248, 1)
      LoadingSpinnerColor: =RGBA(22, 162, 190, 1)
      OnVisible: |-
        =UpdateContext({
            locName:     "",
            locPhone:    "",
            locEmail:    "",
            locDOB:      Blank(),
            locReferral: "",
            locProducer: "",
            locMailing:  "",
            locRisk:     "",
            locYearBuilt:   Blank(),
            locOccupancy:   "Primary Residence",
            locNewPurchase: false,
            locNotes:    ""
        })
    Children:
      - cntTopBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(28, 32, 38, 1)
            Height: =56
            LayoutDirection: =LayoutDirection.Horizontal
            Width: =Parent.Width
            X: =0
            Y: =0
          Children:
            - lblBrandLogo:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =56
                  PaddingLeft: =20
                  PaddingTop: =16
                  Size: =20
                  Text: ="Adams Cosby"
                  Width: =220
            - lblBrandSubtle:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(22, 162, 190, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =56
                  PaddingTop: =18
                  Size: =14
                  Text: ="CRM"
                  Width: =60
                  X: =180
            - lblTopBreadcrumb:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(255, 255, 255, 0.65)
                  Font: =Font.'Open Sans'
                  Height: =56
                  PaddingLeft: =20
                  PaddingTop: =20
                  Size: =12
                  Text: ="Quotes  ›  New Home Quote"
                  Width: =360
                  X: =260
            - btnTopClose:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderThickness: =0
                  Color: =RGBA(255, 255, 255, 0.85)
                  Fill: =RGBA(0, 0, 0, 0)
                  Font: =Font.'Open Sans'
                  Height: =56
                  HoverFill: =RGBA(45, 50, 58, 1)
                  OnSelect: =Back()
                  Size: =14
                  Text: ="✕"
                  Width: =48
                  X: =Parent.Width - 48
      - cntPageHeader:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(0, 0, 0, 0)
            Height: =60
            LayoutDirection: =LayoutDirection.Vertical
            PaddingLeft: =40
            PaddingTop: =14
            Width: =Parent.Width
            X: =0
            Y: =56
          Children:
            - lblPageTitle:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(33, 37, 41, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =30
                  Size: =22
                  Text: ="New Home Quote"
                  Width: =500
            - lblPageSubtitle:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(108, 117, 125, 1)
                  Font: =Font.'Open Sans'
                  Height: =22
                  Size: =11
                  Text: ="Capture customer + property essentials. Save and continue editing later from the dashboard."
                  Width: =800
      - cntFormCard:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =Parent.Height - 220
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width - 80
            X: =40
            Y: =124
          Children:
            - cntCustomerHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(22, 162, 190, 1)
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  Width: =Parent.Width
                Children:
                  - lblCustomerHeader:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =40
                        PaddingLeft: =20
                        PaddingTop: =12
                        Size: =12
                        Text: ="CUSTOMER"
                        Width: =400
            - cntCustomerBody:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =200
                  LayoutDirection: =LayoutDirection.Vertical
                  PaddingBottom: =20
                  PaddingLeft: =24
                  PaddingRight: =24
                  PaddingTop: =18
                  Width: =Parent.Width
                Children:
                  - lblNameTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="NAMED INSURED  *"
                        Width: =320
                        X: =0
                        Y: =0
                  - tbName:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locName
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        OnChange: =UpdateContext({locName: Self.Text})
                        Size: =13
                        Width: =320
                        X: =0
                        Y: =22
                  - lblPhoneTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="PHONE  *"
                        Width: =220
                        X: =340
                        Y: =0
                  - tbPhone:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locPhone
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Format: =TextFormat.Number
                        Height: =34
                        OnChange: =UpdateContext({locPhone: Self.Text})
                        Size: =13
                        Width: =220
                        X: =340
                        Y: =22
                  - lblEmailTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="EMAIL"
                        Width: =320
                        X: =580
                        Y: =0
                  - tbEmail:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locEmail
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        OnChange: =UpdateContext({locEmail: Self.Text})
                        Size: =13
                        Width: =320
                        X: =580
                        Y: =22
                  - lblDOBTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="DATE OF BIRTH"
                        Width: =220
                        X: =0
                        Y: =80
                  - dpDOB:
                      Control: Classic/DatePicker@2.6.0
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        DefaultDate: =If(IsBlank(locDOB), Blank(), locDOB)
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        OnChange: =UpdateContext({locDOB: Self.SelectedDate})
                        Size: =13
                        Width: =220
                        X: =0
                        Y: =102
                  - lblProducerTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="PRODUCER  *"
                        Width: =220
                        X: =240
                        Y: =80
                  - ddProducer:
                      Control: Classic/DropDown@2.3.1
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locProducer
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        Items: |-
                          =["Alec Adams", "Rachel Cosby", "Jessica Adams", "Tammy Dennis", "Leigh Marsh"]
                        OnChange: =UpdateContext({locProducer: Self.Selected.Value})
                        Size: =13
                        Width: =220
                        X: =240
                        Y: =102
                  - lblReferralTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="HOW DID THEY HEAR ABOUT US?"
                        Width: =420
                        X: =480
                        Y: =80
                  - tbReferral:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locReferral
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        OnChange: =UpdateContext({locReferral: Self.Text})
                        Size: =13
                        Width: =420
                        X: =480
                        Y: =102
            - cntPropertyHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(22, 162, 190, 1)
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  Width: =Parent.Width
                Children:
                  - lblPropertyHeader:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =40
                        PaddingLeft: =20
                        PaddingTop: =12
                        Size: =12
                        Text: ="PROPERTY"
                        Width: =400
            - cntPropertyBody:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =200
                  LayoutDirection: =LayoutDirection.Vertical
                  PaddingBottom: =20
                  PaddingLeft: =24
                  PaddingRight: =24
                  PaddingTop: =18
                  Width: =Parent.Width
                Children:
                  - lblMailingTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="MAILING ADDRESS"
                        Width: =440
                        X: =0
                        Y: =0
                  - tbMailing:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locMailing
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        OnChange: =UpdateContext({locMailing: Self.Text})
                        Size: =13
                        Width: =440
                        X: =0
                        Y: =22
                  - lblRiskTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="RISK ADDRESS  (if different)"
                        Width: =440
                        X: =460
                        Y: =0
                  - tbRisk:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locRisk
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        OnChange: =UpdateContext({locRisk: Self.Text})
                        Size: =13
                        Width: =440
                        X: =460
                        Y: =22
                  - lblYearTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="YEAR BUILT"
                        Width: =160
                        X: =0
                        Y: =80
                  - tbYearBuilt:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =If(IsBlank(locYearBuilt), "", Text(locYearBuilt))
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Format: =TextFormat.Number
                        Height: =34
                        OnChange: =UpdateContext({locYearBuilt: IfError(Value(Self.Text), Blank())})
                        Size: =13
                        Width: =160
                        X: =0
                        Y: =102
                  - lblOccupancyTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="OCCUPANCY"
                        Width: =220
                        X: =180
                        Y: =80
                  - ddOccupancy:
                      Control: Classic/DropDown@2.3.1
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locOccupancy
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =34
                        Items: |-
                          =["Primary Residence", "Secondary/Seasonal", "Rental", "Vacant"]
                        OnChange: =UpdateContext({locOccupancy: Self.Selected.Value})
                        Size: =13
                        Width: =220
                        X: =180
                        Y: =102
                  - lblNewPurchaseTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="NEW PURCHASE?"
                        Width: =160
                        X: =420
                        Y: =80
                  - tgNewPurchase:
                      Control: Classic/Toggle@1.0.6
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Default: =locNewPurchase
                        FalseText: ="No"
                        FillUnchecked: =RGBA(206, 212, 218, 1)
                        Height: =34
                        HandleFill: =RGBA(255, 255, 255, 1)
                        HandleHoverFill: =RGBA(255, 255, 255, 1)
                        OnChange: =UpdateContext({locNewPurchase: Self.Value})
                        TrueText: ="Yes"
                        ValueFill: =RGBA(22, 162, 190, 1)
                        ValueHoverFill: =RGBA(18, 142, 167, 1)
                        Width: =80
                        X: =420
                        Y: =102
                  - lblNotesTtl:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(108, 117, 125, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =18
                        Size: =10
                        Text: ="NOTES"
                        Width: =320
                        X: =520
                        Y: =80
                  - tbNotes:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(206, 212, 218, 1)
                        BorderThickness: =1
                        Color: =RGBA(33, 37, 41, 1)
                        Default: =locNotes
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        Height: =56
                        Mode: =TextMode.MultiLine
                        OnChange: =UpdateContext({locNotes: Self.Text})
                        Size: =13
                        Width: =380
                        X: =520
                        Y: =102
      - cntFooter:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(0, 0, 0, 0)
            Height: =60
            LayoutDirection: =LayoutDirection.Horizontal
            PaddingLeft: =40
            PaddingRight: =40
            PaddingTop: =14
            Width: =Parent.Width
            X: =0
            Y: =Parent.Height - 60
          Children:
            - lblRequiredHint:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(108, 117, 125, 1)
                  Font: =Font.'Open Sans'
                  Height: =34
                  PaddingTop: =9
                  Size: =11
                  Text: ="*  Named Insured, Phone, and Producer are required."
                  Width: =400
                  X: =0
            - btnCancel:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =RGBA(206, 212, 218, 1)
                  BorderThickness: =1
                  Color: =RGBA(33, 37, 41, 1)
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =34
                  HoverFill: =RGBA(241, 243, 245, 1)
                  OnSelect: =Back()
                  Size: =12
                  Text: ="Cancel"
                  Width: =100
                  X: =Parent.Width - 320
            - btnSaveQuote:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderThickness: =0
                  Color: =RGBA(255, 255, 255, 1)
                  DisplayMode: =If(!IsBlank(locName) && !IsBlank(locPhone) && !IsBlank(locProducer), DisplayMode.Edit, DisplayMode.Disabled)
                  Fill: =RGBA(22, 162, 190, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =34
                  HoverFill: =RGBA(18, 142, 167, 1)
                  OnSelect: |-
                    =IfError(
                        With({newRow: Patch('Home Quotes', Defaults('Home Quotes'), {
                                Title:           locName,
                                Phone:           locPhone,
                                Email:           locEmail,
                                DOB:             locDOB,
                                ReferralName:    locReferral,
                                MailingAddress:  locMailing,
                                RiskAddress:     locRisk,
                                YearBuilt:       locYearBuilt,
                                NewPurchase:     locNewPurchase,
                                Notes:           locNotes,
                                QuoteDate:       Today()
                            })},
                            ClearCollect(colHomeQuotes, 'Home Quotes');
                            Set(varSelectedQuote, newRow);
                            Notify("Quote saved: " & locName, NotificationType.Success);
                            Back()
                        ),
                        Notify("Save failed: " & FirstError.Message, NotificationType.Error)
                    )
                  Size: =12
                  Text: ="✓  Save Quote"
                  Width: =180
                  X: =Parent.Width - 200
