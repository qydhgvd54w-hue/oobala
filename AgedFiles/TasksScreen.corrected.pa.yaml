      - btnSaveTask:
          Control: Classic/Button@2.2.0
          Properties:
            X: =Parent.Width - 432
            Y: =Parent.Height - 64
            Width: =200
            Height: =44
            Text: =If(IsBlank(gblSelectedTask), "Create Task", "Save Changes")
            Fill: =RGBA(59, 130, 246, 1)
            HoverFill: =RGBA(37, 99, 235, 1)
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Size: =14
            BorderThickness: =0
            Visible: =gblShowAddPanel
            OnSelect: |
              =If(
                  IsBlank(gblSelectedTask),
                  Collect(
                      colPlannerTasks,
                      MicrosoftPlanner.CreateTaskV3(
                          "d3d6d36a-2fdd-4cea-ac61-bdd8e0a132d3",
                          "TIYlGCM_vkSWPKmEYDdSVGQAD_j5",
                          {
                              title: txtNewTitle.Text,
                              bucketId: txtNewBucket.Text,
                              dueDateTime: If(
                                  Len(Trim(txtNewDueDate.Text)) > 0,
                                  Concatenate(txtNewDueDate.Text, "T00:00:00Z"),
                                  Blank()
                              ),
                              percentComplete: Switch(
                                  First(ddNewStatus.SelectedItems).Value,
                                  "Completed", 100,
                                  "In Progress", 50,
                                  0
                              )
                          }
                      )
                  ),
                  Patch(
                      colPlannerTasks,
                      gblSelectedTask,
                      {
                          title: txtNewTitle.Text,
                          bucketId: txtNewBucket.Text,
                          dueDateTime: If(
                              Len(Trim(txtNewDueDate.Text)) > 0,
                              Concatenate(txtNewDueDate.Text, "T00:00:00Z"),
                              Blank()
                          ),
                          percentComplete: Switch(
                              First(ddNewStatus.SelectedItems).Value,
                              "Completed", 100,
                              "In Progress", 50,
                              0
                          )
                      }
                  );
                  MicrosoftPlanner.UpdateTaskV2(
                      gblSelectedTask.id,
                      {
                          title: txtNewTitle.Text,
                          bucketId: txtNewBucket.Text,
                          dueDateTime: If(
                              Len(Trim(txtNewDueDate.Text)) > 0,
                              Concatenate(txtNewDueDate.Text, "T00:00:00Z"),
                              Blank()
                          ),
                          percentComplete: Switch(
                              First(ddNewStatus.SelectedItems).Value,
                              "Completed", 100,
                              "In Progress", 50,
                              0
                          )
                      }
                  )
              );
              Set(gblShowAddPanel, false)

