Screens:
  SettingsScreen:
    Properties:
      Fill: =BgCream2
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
      OnVisible: |-
        =Set(varMyUserSettings,
          LookUp(UserSettings, Lower(User.Email) = Lower(User().Email)));
        If(IsBlank(varMyUserSettings),
           Set(varMyUserSettings,
             Patch(UserSettings, Defaults(UserSettings),
               {
                 Title: User().FullName,
                 User: { '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                         Claims: "i:0#.f|membership|" & Lower(User().Email),
                         DisplayName: User().FullName,
                         Email: User().Email,
                         Department: "",
                         JobTitle: "",
                         Picture: "" },
                 Theme: { Value: "BrandRed" },
                 Signature: ""
               })));
        Set(varCurrentTheme, Coalesce(varMyUserSettings.Theme.Value, "BrandRed"))
    Children:
