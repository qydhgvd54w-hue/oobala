                  Color: =TextSecondary
                  X: =28
                  Y: =54
                  Width: =230
  
            # STATUS PILL
            - RowStatusPill:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =Switch(ThisItem.Status.Value,
                    "Active",      ColorStatus.Active,
                    "Bound",       ColorStatus.Bound,
                    "Working",     ColorStatus.Working,
                    "Lost",        ColorStatus.Lost,
                    "Quoted",      ColorStatus.Quoted,
                    "Contacted",   ColorStatus.Contacted,
                    "Negotiating", ColorStatus.Negotiating,
                    ColorStatus.Default)
                  Width: =96
                  Height: =26
                  RadiusBottomLeft: =999
                  RadiusBottomRight: =999
                  RadiusTopLeft: =999
                  RadiusTopRight: =999
                  X: =298
                  Y: =23
  
