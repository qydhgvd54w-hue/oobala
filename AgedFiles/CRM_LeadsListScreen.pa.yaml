      # ─────────────────────────────────────────────────────────
      # LEADS GALLERY
      # ─────────────────────────────────────────────────────────
      - LeadsGallery:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_ThreeTextVariant_ver5.0
          Properties:
            X: =272
            Y: =313
            Width: =App.Width - 300
            Height: =App.Height - 392
            BorderThickness: =0
            Fill: =RGBA(0, 0, 0, 0)
            TemplateSize: =If(!IsBlank(varExpandedLead) && varExpandedLead.ID = ThisItem.ID, 360, 72)
            TemplateFill: =If(!IsBlank(varExpandedLead) && varExpandedLead.ID = ThisItem.ID, RGBA(249, 250, 255, 1), RGBA(255, 255, 255, 1))
            TemplateMarginBottom: =0
            Items: =SortByColumns(
              Filter(Leads,
                (varSearchText = ""
                  || StartsWith(Title, varSearchText)
                  || StartsWith('Phone Number', varSearchText)
                  || StartsWith(Email, varSearchText)),
                (varStatusFilter = "All" || Status.Value = varStatusFilter),
                (varAgentFilter = "All"
                  || Agent.DisplayName = varAgentFilter
                  || (varAgentFilter = "Unassigned" && IsBlank(Agent)))
              ),
              varSortColumn, If(varSortAscending, SortOrder.Ascending, SortOrder.Descending)
            )
          Children:
  
            # ROW SEPARATOR
            - RowDivider:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =BorderSoft
                  Width: =Parent.TemplateWidth
                  Height: =1
                  X: =0
                  Y: =Parent.TemplateHeight - 1
  
            # INVISIBLE ROW CLICK TARGET
            - RowTapTarget:
                Control: Button@2.2.0
                Properties:
                  Text: =""
                  Fill: =RGBA(0, 0, 0, 0)
                  HoverFill: =RGBA(99, 102, 241, 0.04)
                  PressedFill: =RGBA(99, 102, 241, 0.08)
                  BorderThickness: =0
                  Width: =Parent.TemplateWidth - 200
                  Height: =72
                  X: =0
                  Y: =0
                  OnSelect: |
                    If(
                      !IsBlank(varExpandedLead) && varExpandedLead.ID = ThisItem.ID,
                      Set(varExpandedLead, Blank()),
                      Set(varExpandedLead, ThisItem)
                    )
  
            # OVERDUE STRIP
            - OverdueStrip:
                Control: Rectangle@2.3.0
                Properties:
                  Visible: =Today() > DateAdd(ThisItem.Modified, 7, Days) && ThisItem.Status.Value <> "Bound" && !StartsWith(ThisItem.Status.Value, "Lost")
                  Fill: =RGBA(239, 68, 68, 1)
                  Width: =3
                  Height: =72
                  X: =0
                  Y: =0
  
            # LEAD NAME + PHONE
            - RowLeadName:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Title
                  FontWeight: =FontWeight.Semibold
                  Size: =13
                  Color: =TextPrimary
                  X: =28
                  Y: =14
                  Width: =230
  
            - RowLeadPhone:
                Control: Label@2.5.1
                Properties:
                  Text: =Coalesce(ThisItem.'Phone Number', "No phone")
                  Size: =11
                  Color: =TextSecondary
                  X: =28
                  Y: =38
                  Width: =230
  
            - RowLeadEmail:
