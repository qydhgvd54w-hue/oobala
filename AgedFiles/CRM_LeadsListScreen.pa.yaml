      # ─────────────────────────────────────────────────────────
      # FOOTER
      # ─────────────────────────────────────────────────────────
      - FooterBg:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =BgCard
            BorderColor: =BorderSoft
            BorderThickness: =1
            Width: =App.Width - 300
            Height: =52
            X: =272
            Y: =App.Height - 52
  
      - FooterDivider:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =BorderSoft
            Width: =App.Width - 300
            Height: =1
            X: =272
            Y: =App.Height - 53
  
      - FooterCount:
          Control: Label@2.5.1
          Properties:
            Text: =Concatenate(
              "Showing ",
              Text(CountRows(LeadsGallery.AllItems), "0"),
              " of ",
              Text(LookUp(colLeadCounts, Status = "Total").Count, "0"),
              " leads")
            Size: =11
            Color: =TextSecondary
            X: =292
            Y: =App.Height - 38
  
      - FooterFilterTag:
          Control: Label@2.5.1
          Properties:
            Visible: =varStatusFilter <> "All" || varAgentFilter <> "All" || varSearchText <> ""
            Text: ="Filtered"
            Size: =10
            FontWeight: =FontWeight.Semibold
            Color: =BrandPrimary
            X: =460
            Y: =App.Height - 38
  
      - FooterLastUpdated:
          Control: Label@2.5.1
          Properties:
            Text: ="Last refreshed: " & Text(Now(), "[$-en-US]h:mm AM/PM")
            Size: =11
            Color: =TextSecondary
            X: =App.Width - 350
            Y: =App.Height - 38
  
      - FooterRefreshBtn:
          Control: Button@2.2.0
          Properties:
            Text: ="↻ Refresh"
            Fill: =RGBA(0,0,0,0)
            HoverFill: =BgApp
            BorderThickness: =0
            Color: =BrandPrimary
            FontWeight: =FontWeight.Semibold
            Width: =100
            Height: =36
            X: =App.Width - 184
            Y: =App.Height - 44
            OnSelect: |
              ClearCollect(colLeadCounts,
                {Status: "Active",      Count: CountRows(Filter(Leads, Status.Value = "Active"))},
                {Status: "Working",     Count: CountRows(Filter(Leads, Status.Value = "Working"))},
                {Status: "Quoted",      Count: CountRows(Filter(Leads, Status.Value = "Quoted"))},
                {Status: "Negotiating", Count: CountRows(Filter(Leads, Status.Value = "Negotiating"))},
                {Status: "Contacted",   Count: CountRows(Filter(Leads, Status.Value = "Contacted"))},
                {Status: "Bound",       Count: CountRows(Filter(Leads, Status.Value = "Bound"))},
                {Status: "Lost",        Count: CountRows(Filter(Leads, StartsWith(Status.Value, "Lost")))},
                {Status: "Overdue",     Count: CountRows(Filter(Leads, Today() > DateAdd(Modified, 7, Days) && Status.Value <> "Bound" && !StartsWith(Status.Value, "Lost")))},
                {Status: "Total",       Count: CountRows(Leads)}
              );
              Notify("Data refreshed", NotificationType.Success, 1500)
