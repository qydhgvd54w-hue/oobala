LeadsListScreen_V3:
  Properties:
    Fill: =BgApp
    LoadingSpinnerColor: =BrandPrimary
    Width: =App.Width
    Height: =App.Height
    OnVisible: |
      Set(varStatusFilter, Coalesce(varStatusFilter, "All"));
      Set(varAgentFilter, Coalesce(varAgentFilter, "All"));
      Set(varSearchText, "");
      Set(varExpandedLead, Blank());
      ClearCollect(colLeadCounts, {Status: "Active", Count: CountRows(Filter(Leads, Status.Value = "Active"))}, {Status: "Working", Count: CountRows(Filter(Leads, Status.Value = "Working"))}, {Status: "Bound", Count: CountRows(Filter(Leads, Status.Value = "Bound"))}, {Status: "Lost", Count: CountRows(Filter(Leads, StartsWith(Status.Value, "Lost")))}, {Status: "Quoted", Count: CountRows(Filter(Leads, Status.Value = "Quoted"))}, {Status: "Contacted", Count: CountRows(Filter(Leads, Status.Value = "Contacted"))}, {Status: "Negotiating", Count: CountRows(Filter(Leads, Status.Value = "Negotiating"))}, {Status: "Total", Count: CountRows(Leads)})
