    "CalListGallery As gallery.'BrowseLayout_Vertical_ThreeTextVariant_ver5.0'":
        BorderColor: =RGBA(0, 0, 0, 0)
        Fill: =RGBA(255, 255, 255, 0)
        Height: =Parent.Height - 200
        Items: =SortByColumns(Filter('Calendar Events', Start >= Today()), "Start", SortOrder.Ascending)
        Layout: =Layout.Vertical
        ShowScrollbar: =true
        TemplateFill: =RGBA(255, 255, 255, 0)
        TemplatePadding: =0
        TemplateSize: =80
        Width: =Parent.Width - 264
        X: =232
        Y: =152
        ZIndex: =5

        CalRowDateBlock As rectangle:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =BrandSoft
            Height: =56
            OnSelect: =Notify("Calendar drill-through coming next pass", NotificationType.Information)
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Width: =56
            X: =8
            Y: =12
            ZIndex: =1

        CalRowDay As label:
            Align: =Align.Center
            Color: =BrandRed
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =30
            OnSelect: =Notify("Calendar drill-through coming next pass", NotificationType.Information)
            Size: =22
            Text: =Text(ThisItem.Start, "[$-en-US]d")
            Width: =56
            X: =8
            Y: =14
            ZIndex: =2

        CalRowMonth As label:
            Align: =Align.Center
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =20
            OnSelect: =Notify("Calendar drill-through coming next pass", NotificationType.Information)
            Size: =10
            Text: =Upper(Text(ThisItem.Start, "[$-en-US]mmm"))
            Width: =56
            X: =8
            Y: =44
            ZIndex: =3

        CalRowTitle As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            OnSelect: =Notify("Calendar drill-through coming next pass", NotificationType.Information)
            Size: =13
            Text: =Coalesce(ThisItem.Title, "(untitled event)")
            Width: =Parent.TemplateWidth - 280
            X: =80
            Y: =12
            ZIndex: =4

        CalRowEventType As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =18
            OnSelect: =Notify("Calendar drill-through coming next pass", NotificationType.Information)
            Size: =10
            Text: =If(IsBlank(ThisItem.EventType), "Event", ThisItem.EventType.Value)
            Width: =200
            X: =80
            Y: =38
            ZIndex: =5

        CalRowAgent As label:
            Align: =Align.Right
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =18
            OnSelect: =Notify("Calendar drill-through coming next pass", NotificationType.Information)
            Size: =11
            Text: =If(IsBlank(ThisItem.Agent), "Unassigned", ThisItem.Agent.DisplayName)
            Width: =160
            X: =Parent.TemplateWidth - 180
            Y: =12
            ZIndex: =6

