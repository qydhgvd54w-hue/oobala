    "TskGallery As gallery.'BrowseLayout_Vertical_ThreeTextVariant_ver5.0'":
        BorderColor: =BorderSoft
        Fill: =RGBA(255, 255, 255, 1)
        Height: =Parent.Height - 144
        Items: =Filter(colTasks, varTaskSearch = "" Or StartsWith(Lower(Coalesce(Title, "")), Lower(varTaskSearch)))
        Layout: =Layout.Vertical
        ShowScrollbar: =true
        TemplatePadding: =0
        TemplateSize: =76
        Width: =Parent.Width - 232
        X: =216
        Y: =128
        ZIndex: =32

        TskRowIcon As label:
            Color: =If(ThisItem.DaysOpen > 14, StatusLost, If(ThisItem.DaysOpen > 7, StatusWorking, StatusActive))
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =32
            Size: =18
            Text: =If(ThisItem.DaysOpen > 14, "🔴", If(ThisItem.DaysOpen > 7, "🟠", "🟢"))
            Width: =40
            X: =16
            Y: =22
            ZIndex: =1
        TskRowName As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =14
            Text: ="Follow up on " & Coalesce(ThisItem.Title, "quote") & " · QID " & Coalesce(ThisItem.QuoteID, "—")
            Width: =Parent.TemplateWidth * 0.45
            X: =60
            Y: =14
            ZIndex: =2
        TskRowSub As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =18
            Size: =11
            Text: ="Quote sent " & If(IsBlank(ThisItem.QuoteDate), "—", Text(ThisItem.QuoteDate, "[$-en-US]m/d")) & "  ·  " & Coalesce(ThisItem.Phone, ThisItem.Email, "—")
            Width: =Parent.TemplateWidth * 0.45
            X: =60
            Y: =40
            ZIndex: =3
        TskRowProducer As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =76
            PaddingTop: =28
            Size: =12
            Text: =Coalesce(ThisItem.Agent.Value, "Unassigned")
            Width: =Parent.TemplateWidth * 0.15
            X: =Parent.TemplateWidth * 0.50
            Y: =0
            ZIndex: =4
        TskRowDays As label:
            Color: =If(ThisItem.DaysOpen > 14, StatusLost, If(ThisItem.DaysOpen > 7, StatusWorking, TextPrimary))
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =76
            PaddingTop: =28
            Size: =12
            Text: =Text(ThisItem.DaysOpen) & " day" & If(ThisItem.DaysOpen = 1, "", "s") & " open"
            Width: =Parent.TemplateWidth * 0.12
            X: =Parent.TemplateWidth * 0.65
            Y: =0
            ZIndex: =5
        TskRowCallBtn As button:
            BorderColor: =BorderSoft
            BorderThickness: =1
            Color: =TextPrimary
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =32
            OnSelect: =Patch(Activities, Defaults(Activities), {Title: "Called " & Coalesce(ThisItem.Title, "client"), ActivityType: {Value: "Call"}, EventDate: Now(), Outcome: "Follow-up from Tasks", Lead: {Id: LookUp(Leads, 'Phone Number' = ThisItem.Phone Or Email = ThisItem.Email).ID, Value: LookUp(Leads, 'Phone Number' = ThisItem.Phone Or Email = ThisItem.Email).Title}}); Notify("Call logged for " & ThisItem.Title, NotificationType.Success)
            Size: =11
            Text: ="📞 Call"
            Width: =80
            X: =Parent.TemplateWidth * 0.78
            Y: =22
            ZIndex: =6
        TskRowEmailBtn As button:
            BorderColor: =BrandRed
            BorderThickness: =1
            Color: =RGBA(255, 255, 255, 1)
            DisplayMode: =If(IsBlank(ThisItem.Email), DisplayMode.Disabled, DisplayMode.Edit)
            Fill: =BrandRed
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =32
            OnSelect: =Office365Outlook.SendEmailV2(ThisItem.Email, "Following up on your Adams Cosby quote", "Hi " & Coalesce(ThisItem.Title, "there") & ",<br/><br/>Just checking in on the home quote we sent on " & Text(ThisItem.QuoteDate, "[$-en-US]m/d/yyyy") & ". Let me know if you have any questions.<br/><br/>Thanks,<br/>" & Coalesce(User().FullName, "Adams Cosby"), {Cc: "teamac@alfains.com", ReplyTo: "teamac@alfains.com", IsHtml: true}); Notify("Email sent to " & ThisItem.Email, NotificationType.Success)
            Size: =11
            Text: ="✉️ Email"
            Width: =80
            X: =Parent.TemplateWidth * 0.88
            Y: =22
            ZIndex: =7
        TskRowDivider As rectangle:
            Fill: =BorderSoft
            Height: =1
            Width: =Parent.TemplateWidth - 40
            X: =20
            Y: =75
            ZIndex: =8
