        OnChange: =Set(varTaskSearch, Self.Text)
        Size: =13
        Width: =380
        X: =232
        Y: =80
        ZIndex: =28

    TskFilterOpen As button:
        BorderColor: =If(varTaskFilter="Open", BrandRed, BorderSoft)
        BorderThickness: =1
        Color: =If(varTaskFilter="Open", RGBA(255, 255, 255, 1), TextSecondary)
        Fill: =If(varTaskFilter="Open", BrandRed, RGBA(255, 255, 255, 1))
        Font: =Font.'Open Sans'
        FontWeight: =FontWeight.Bold
        Height: =32
        OnSelect: =Set(varTaskFilter, "Open")
        Size: =11
        Text: ="Open Quotes " & Text(CountRows(Filter('Home Quotes', !IsBlank(QuoteID) And IsBlank(AutoPolicyNumber))))
        Width: =160
        X: =628
        Y: =82
        ZIndex: =29
    TskFilterFollowups As button:
        BorderColor: =If(varTaskFilter="Followup", StatusWorking, BorderSoft)
        BorderThickness: =1
