    ActBackButton As button:
        BorderColor: =RGBA(255, 255, 255, 0.3)
        BorderThickness: =1
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(255, 255, 255, 0.15)
        FontWeight: =FontWeight.Semibold
        Height: =36
        OnSelect: =Navigate(Dashboard, ScreenTransition.None)
        PressedFill: =RGBA(255, 255, 255, 0.25)
        Size: =13
        Text: ="← Dashboard"
        Width: =120
        X: =Parent.Width - 136
        Y: =22
        ZIndex: =100
    ActSearchBox As text:
        BorderColor: =BorderSoft
        BorderThickness: =1
        Default: =""
        Fill: =RGBA(255, 255, 255, 1)
        Font: =Font.'Open Sans'
        Height: =36
        HintText: ="Search activity notes"
        OnChange: =Set(varActivitySearch, Self.Text)
        Size: =13
        Width: =400
        X: =232
        Y: =104
        ZIndex: =4
    "ActListGallery As gallery.'BrowseLayout_Vertical_ThreeTextVariant_ver5.0'":
        BorderColor: =BorderSoft
        Fill: =RGBA(255, 255, 255, 1)
        Height: =Parent.Height - 200
        Items: =SortByColumns(Filter(Activities, IsBlank(varActivitySearch) || StartsWith(ActivityNotes, varActivitySearch)), "EventDate", SortOrder.Descending)
        Layout: =Layout.Vertical
        TemplatePadding: =0
        TemplateSize: =72
        Width: =Parent.Width - 264
        X: =232
        Y: =152
        ZIndex: =5

        ActRowIcon As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =32
            Size: =18
            Text: =Switch(ThisItem.ActivityType.Value, "Phone Call", "📞", "Text", "💬", "Email", "📨", "Meeting", "🤝", "Note", "📝", "Status Change", "🔄", "Created", "✨", "📌")
            Width: =32
            X: =8
            Y: =8
            ZIndex: =1

        ActRowTitle As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =18
            Size: =12
            Text: =If(IsBlank(ThisItem.Lead), Coalesce(ThisItem.ActivityType.Value, ThisItem.Title), ThisItem.Lead.Value & " — " & Coalesce(ThisItem.ActivityType.Value, ""))
            Width: =Parent.TemplateWidth - 200
            X: =48
            Y: =8
            ZIndex: =2

        ActRowNotes As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =14
            Size: =10
            Text: =Coalesce(ThisItem.ActivityNotes, "")
            Width: =Parent.TemplateWidth - 200
            X: =48
            Y: =28
            ZIndex: =3

        ActRowDate As label:
            Align: =Align.Right
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =18
            Size: =10
            Text: =Text(ThisItem.EventDate, "[$-en-US]m/d/yy h:mm AM/PM")
            Width: =160
            X: =Parent.TemplateWidth - 180
            Y: =8
            ZIndex: =4

        ActRowSeparator As rectangle:
            Fill: =BorderSoft
            Height: =1
            Width: =Parent.TemplateWidth
            X: =0
            Y: =71
            ZIndex: =5
