    "DashQueueGallery As gallery.'BrowseLayout_Vertical_ThreeTextVariant_ver5.0'":
        BorderColor: =RGBA(0, 0, 0, 0)
        Fill: =RGBA(0, 0, 0, 0)
        Height: =440
        Items: =SortByColumns(Filter('Home Quotes', varDashSearch = "" Or StartsWith(Lower(Coalesce(Title, "")), Lower(varDashSearch))), "QuoteDate", SortOrder.Descending)
        Layout: =Layout.Vertical
        OnSelect: =Set(varSelectedQuote, ThisItem); Set(varSelectedLead, LookUp(Leads, 'Phone Number' = ThisItem.Phone Or Email = ThisItem.Email))
        TemplateFill: =If(!IsBlank(varSelectedQuote) And ThisItem.ID = varSelectedQuote.ID, BrandSoft, RGBA(255, 255, 255, 0))
        TemplatePadding: =0
        TemplateSize: =64
        Width: =(Parent.Width - 232) * 0.55 - 16
        X: =228
        Y: =244
        ZIndex: =45

        DashRowName As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            PaddingLeft: =16
            Size: =13
            Text: =Coalesce(ThisItem.Title, "Unnamed Lead")
            Width: =Parent.TemplateWidth * 0.35
            X: =0
            Y: =10
