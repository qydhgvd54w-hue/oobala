    "HQGallery As gallery.'BrowseLayout_Vertical_ThreeTextVariant_ver5.0'":
        BorderColor: =BorderSoft
        Fill: =RGBA(255, 255, 255, 1)
        Height: =Parent.Height - 144
        Items: =SortByColumns(Filter('Home Quotes', (varHQSearch = "" Or StartsWith(Lower(Coalesce(Title, "")), Lower(varHQSearch)) Or StartsWith(Coalesce(Phone, ""), varHQSearch) Or StartsWith(Lower(Coalesce(Email, "")), Lower(varHQSearch)) Or StartsWith(Coalesce(AccountNumber, ""), varHQSearch)) And (varHQStatusFilter = "All" Or (varHQStatusFilter = "Active" And QuoteDate >= DateAdd(Today(), -7, TimeUnit.Days) And IsBlank(QuoteID) And IsBlank(AutoPolicyNumber)) Or (varHQStatusFilter = "Working" And IsBlank(QuoteID) And IsBlank(AutoPolicyNumber)) Or (varHQStatusFilter = "Quoted" And !IsBlank(QuoteID) And IsBlank(AutoPolicyNumber)) Or (varHQStatusFilter = "Bound" And !IsBlank(AutoPolicyNumber))), "QuoteDate", SortOrder.Descending)
        Layout: =Layout.Vertical
        ShowScrollbar: =true
        TemplatePadding: =0
        TemplateSize: =72
        Width: =Parent.Width - 232
        X: =216
        Y: =128
        ZIndex: =35

        HQRowName As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            PaddingLeft: =20
            Size: =14
            Text: =Coalesce(ThisItem.Title, "Unnamed")
            Width: =Parent.TemplateWidth * 0.28
            X: =0
            Y: =12
            ZIndex: =1
        HQRowSub As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =18
            PaddingLeft: =20
            Size: =11
            Text: =Coalesce(ThisItem.Phone, ThisItem.Email, "—")
            Width: =Parent.TemplateWidth * 0.28
            X: =0
            Y: =38
            ZIndex: =2
        HQRowQuoteId As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =72
            PaddingTop: =26
            Size: =12
            Text: =Coalesce(ThisItem.QuoteID, ThisItem.AccountNumber, "—")
            Width: =Parent.TemplateWidth * 0.13
            X: =Parent.TemplateWidth * 0.28
            Y: =0
            ZIndex: =3
        HQRowProducer As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =72
            PaddingTop: =26
            Size: =12
            Text: =Coalesce(ThisItem.Agent.Value, "Unassigned")
            Width: =Parent.TemplateWidth * 0.14
            X: =Parent.TemplateWidth * 0.41
            Y: =0
            ZIndex: =4
        HQRowOccupancy As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =72
            PaddingTop: =26
            Size: =12
            Text: =Coalesce(ThisItem.Occupancy.Value, "Home")
            Width: =Parent.TemplateWidth * 0.12
            X: =Parent.TemplateWidth * 0.55
            Y: =0
            ZIndex: =5
        HQRowDate As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =72
            PaddingTop: =26
            Size: =11
            Text: =If(IsBlank(ThisItem.QuoteDate), "—", Text(ThisItem.QuoteDate, "[$-en-US]m/d/yyyy"))
            Width: =Parent.TemplateWidth * 0.12
            X: =Parent.TemplateWidth * 0.67
            Y: =0
            ZIndex: =6
        HQRowPremium As label:
            Align: =Align.Right
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =72
            PaddingTop: =26
            Size: =12
            Text: ="—"
            Width: =Parent.TemplateWidth * 0.08
            X: =Parent.TemplateWidth * 0.79
            Y: =0
            ZIndex: =7
        HQRowStatusBg As rectangle:
            Fill: =If(!IsBlank(ThisItem.AutoPolicyNumber), StatusBound_Bg, If(!IsBlank(ThisItem.QuoteID), StatusQuoted_Bg, If(ThisItem.QuoteDate >= DateAdd(Today(), -7, TimeUnit.Days), StatusNew_Bg, StatusProg_Bg)))
            Height: =24
            RadiusBottomLeft: =12
            RadiusBottomRight: =12
            RadiusTopLeft: =12
            RadiusTopRight: =12
            Width: =100
            X: =Parent.TemplateWidth * 0.88
            Y: =24
            ZIndex: =8
        HQRowStatusLbl As label:
            Align: =Align.Center
            Color: =If(!IsBlank(ThisItem.AutoPolicyNumber), StatusBound_Fg, If(!IsBlank(ThisItem.QuoteID), StatusQuoted_Fg, If(ThisItem.QuoteDate >= DateAdd(Today(), -7, TimeUnit.Days), StatusNew_Fg, StatusProg_Fg)))
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =24
            PaddingTop: =4
            Size: =10
            Text: =If(!IsBlank(ThisItem.AutoPolicyNumber), "BOUND", If(!IsBlank(ThisItem.QuoteID), "QUOTED", If(ThisItem.QuoteDate >= DateAdd(Today(), -7, TimeUnit.Days), "ACTIVE", "WORKING")))
            Width: =100
            X: =Parent.TemplateWidth * 0.88
            Y: =24
            ZIndex: =9
        HQRowDivider As rectangle:
            Fill: =BorderSoft
            Height: =1
            Width: =Parent.TemplateWidth - 40
            X: =20
            Y: =71
            ZIndex: =10
