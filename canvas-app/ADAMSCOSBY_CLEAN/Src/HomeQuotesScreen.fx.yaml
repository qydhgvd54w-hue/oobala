        Fill: =If(varHQStatusFilter="Active", StatusActive, RGBA(255, 255, 255, 1))
        Font: =Font.'Open Sans'
        FontWeight: =FontWeight.Bold
        Height: =32
        OnSelect: =Set(varHQStatusFilter, "Active")
        Size: =11
        Text: ="Active " & Text(CountRows(Filter('Home Quotes', QuoteDate >= DateAdd(Today(), -7, TimeUnit.Days))))
