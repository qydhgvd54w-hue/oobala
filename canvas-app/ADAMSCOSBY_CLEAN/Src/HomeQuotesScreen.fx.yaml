    HQStatusAll As button:
        BorderColor: =If(varHQStatusFilter="All", BrandRed, BorderSoft)
        BorderThickness: =1
        Color: =If(varHQStatusFilter="All", RGBA(255, 255, 255, 1), TextSecondary)
        Fill: =If(varHQStatusFilter="All", BrandRed, RGBA(255, 255, 255, 1))
        Font: =Font.'Open Sans'
        FontWeight: =FontWeight.Bold
        Height: =32
        OnSelect: =Set(varHQStatusFilter, "All")
        Size: =11
