    "TplListGallery As gallery.'BrowseLayout_Vertical_ThreeTextVariant_ver5.0'":
        BorderColor: =BorderSoft
        Fill: =RGBA(255, 255, 255, 1)
        Height: =600
        Items: =SortByColumns(Filter('Email Templates', (IsBlank(varTemplateSearch) || StartsWith(Title, varTemplateSearch)) And (IsBlank(AssignedAgents) || User().Email in Concat(AssignedAgents, Email, ";"))), "Title", SortOrder.Ascending)
        Layout: =Layout.Vertical
        TemplateFill: =If(!IsBlank(varSelectedTemplate) && ThisItem.ID = varSelectedTemplate.ID, BrandSoft, RGBA(255, 255, 255, 0))
        TemplatePadding: =0
        TemplateSize: =80
        Width: =480
        X: =232
        Y: =152
        ZIndex: =5

        TplGalleryRowHotspot As button:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderThickness: =0
            Color: =RGBA(0, 0, 0, 0)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            DisabledColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =0
            Font: =Font.'Open Sans'
            Height: =Parent.TemplateHeight
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(0, 0, 0, 0)
            HoverFill: =RGBA(0, 0, 0, 0)
            OnSelect: =Set(varSelectedTemplate, ThisItem)
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(0, 0, 0, 0)
            PressedFill: =RGBA(0, 0, 0, 0)
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Size: =1
            Text: =""
            Width: =Parent.TemplateWidth
            X: =0
            Y: =0
            ZIndex: =1

        TplGalleryRowTitle As label:
            Color: =TextPrimary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            PaddingLeft: =16
            Size: =14
            Text: =ThisItem.Title
            Width: =Parent.TemplateWidth - 16
            X: =0
            Y: =8
            ZIndex: =2

        TplGalleryRowSubject As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =18
            PaddingLeft: =16
            Size: =12
            Text: =Coalesce(ThisItem.Subject, "")
            Width: =Parent.TemplateWidth - 16
            X: =0
            Y: =30
            ZIndex: =3

        TplGalleryRowModified As label:
            Color: =TextSecondary
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =16
            PaddingLeft: =16
            Size: =11
            Text: =Text(ThisItem.Modified, "[$-en-US]m/d/yy")
            Width: =Parent.TemplateWidth - 16
            X: =0
            Y: =50
            ZIndex: =4

        TplGalleryRowSeparator As rectangle:
            Fill: =BorderSoft
            Height: =1
            Width: =Parent.TemplateWidth
            X: =0
            Y: =79
            ZIndex: =5

