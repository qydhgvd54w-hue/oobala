    TplSearchBox As text:
        BorderColor: =BorderSoft
        BorderThickness: =1
        Default: =""
        Fill: =RGBA(255, 255, 255, 1)
        Font: =Font.'Open Sans'
        Height: =36
        HintText: ="Search templates"
        OnChange: =Set(varTemplateSearch, Self.Text)
